<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tufte Editor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tufte-css/1.8.0/tufte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" data-manual></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Toggle sidebar">&#9776;</button>
        <span class="doc-title" contenteditable="true" spellcheck="false">Untitled Document</span>
        <span class="word-count">0 words</span>
      </div>
      <div class="topbar-right">
        <div class="view-toggles toggle-group">
          <button class="view-btn toggle-btn" data-view="edit" title="Editor only">Edit</button>
          <button class="view-btn toggle-btn active" data-view="split" title="Split view">Split</button>
          <button class="view-btn toggle-btn" data-view="preview" title="Preview only">Preview</button>
        </div>
        <div class="cite-style-toggle toggle-group">
          <button class="cite-style-btn toggle-btn active" data-cite-style="numbered" title="Numbered citations">[1]</button>
          <button class="cite-style-btn toggle-btn" data-cite-style="apa" title="APA citations">APA</button>
        </div>
        <div class="appearance-controls">
          <label class="color-picker-label" title="Background color">
            <span class="color-label-text">Bg</span>
            <input type="color" id="bg-color-input" class="color-input" value="#fffff8">
          </label>
          <label class="color-picker-label" title="Font color">
            <span class="color-label-text">A</span>
            <input type="color" id="font-color-input" class="color-input" value="#111111">
          </label>
          <select id="font-select" class="font-select" title="Preview font">
            <option value="et-book">ET Book</option>
            <option value="palatino">Palatino</option>
            <option value="georgia">Georgia</option>
            <option value="times">Times New Roman</option>
            <option value="garamond">Garamond</option>
            <option value="system-sans">Sans-serif</option>
          </select>
          <button id="font-upload-btn" class="topbar-small-btn" title="Upload custom font">+ Font</button>
          <input type="file" id="font-file-input" accept=".woff,.woff2,.ttf,.otf" style="display:none">
        </div>
        <div class="export-dropdown">
          <button class="export-btn">Export &#9662;</button>
          <div class="export-menu">
            <button data-export="html">Download HTML</button>
            <button data-export="print">Print / PDF</button>
            <button data-export="markdown">Copy Markdown</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="undo-btn" title="Undo (Ctrl+Z)">Undo</button>
      <button id="redo-btn" title="Redo (Ctrl+Shift+Z)">Redo</button>
      <span class="toolbar-sep"></span>
      <button data-insert="sidenote" title="Sidenote">Sidenote</button>
      <button data-insert="marginnote" title="Margin Note">Margin Note</button>
      <button data-insert="newthought" title="New Thought">New Thought</button>
      <button data-insert="epigraph" title="Epigraph">Epigraph</button>
      <button data-insert="fullwidth" title="Full-width Figure">Full-width Figure</button>
      <button data-insert="marginfig" title="Margin Figure">Margin Fig</button>
      <span class="toolbar-sep"></span>
      <button data-insert="bold" title="Bold">B</button>
      <button data-insert="italic" title="Italic">I</button>
      <button data-insert="code" title="Inline Code">&lt;/&gt;</button>
      <button data-insert="link" title="Link">Link</button>
      <button data-insert="image" title="Image">Image</button>
      <button data-insert="heading" title="Heading">H2</button>
      <button data-insert="hr" title="Horizontal Rule">HR</button>
      <button id="table-btn" title="Insert Table">Table</button>
      <span class="toolbar-sep"></span>
      <button data-insert="cite" title="Citation">Cite</button>
      <button data-insert="citeurl" title="URL Citation">Cite URL</button>
      <button id="bib-btn" title="Manage Bibliography">Bib</button>
      <span class="toolbar-sep"></span>
      <button id="img-manage-btn" title="Manage Images">Images</button>
      <input type="file" id="img-file-input" accept="image/*" multiple style="display:none">
    </div>

    <!-- Main Area -->
    <div class="main-area">
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Documents</span>
          <div class="sidebar-header-actions">
            <button id="new-folder-btn" class="sidebar-new-btn" title="New folder">+ Folder</button>
            <button id="new-doc-btn" class="sidebar-new-btn" title="New document">+ Doc</button>
          </div>
        </div>
        <div class="sidebar-list" id="sidebar-list"></div>
      </aside>
      <div class="split-pane">
        <div class="pane editor-pane">
          <textarea id="editor" spellcheck="true" placeholder="Write your Tufte Markdown here..."></textarea>
        </div>
        <div class="divider" title="Drag to resize"></div>
        <div class="pane preview-pane">
          <div id="preview" class="preview-content">
            <article>
            </article>
          </div>
        </div>
      </div>
    </div>

    <!-- Document Context Menu (move to folder) -->
    <div id="doc-context-menu" class="table-context-menu"></div>

    <!-- Citation Autocomplete -->
    <div id="autocomplete" class="autocomplete-dropdown"></div>

    <!-- Table Grid Picker -->
    <div id="table-grid-picker" class="table-grid-picker">
      <div class="grid-picker-label">Insert Table</div>
      <div class="grid-picker-grid" id="grid-picker-grid"></div>
    </div>

    <!-- Table Context Menu -->
    <div id="table-context-menu" class="table-context-menu">
      <button data-action="add-row-above">Add row above</button>
      <button data-action="add-row-below">Add row below</button>
      <button data-action="add-col-left">Add column left</button>
      <button data-action="add-col-right">Add column right</button>
      <div class="context-menu-sep"></div>
      <button data-action="delete-row">Delete row</button>
      <button data-action="delete-col">Delete column</button>
      <div class="context-menu-sep"></div>
      <button data-action="delete-table" class="context-menu-danger">Delete table</button>
    </div>

    <!-- Bibliography Modal -->
    <div id="bib-modal" class="modal-overlay" style="display:none;">
      <div class="modal">
        <h3>Load Bibliography</h3>
        <p>Paste BibTeX entries or load a .bib file:</p>
        <textarea id="bib-textarea" rows="10" placeholder="@article{key,&#10;  author = {Last, First},&#10;  title = {Title},&#10;  year = {2024},&#10;  journal = {Journal Name}&#10;}"></textarea>
        <div class="modal-file-row">
          <input type="file" id="bib-file" accept=".bib,.bibtex,.txt">
          <span id="bib-status"></span>
        </div>
        <div class="modal-actions">
          <button id="bib-cancel" class="modal-btn">Cancel</button>
          <button id="bib-apply" class="modal-btn modal-btn-primary">Apply</button>
          <button id="bib-clear" class="modal-btn modal-btn-danger">Clear All</button>
        </div>
      </div>
    </div>

    <!-- Image Management Modal -->
    <div id="img-modal" class="modal-overlay" style="display:none;">
      <div class="modal">
        <h3>Images</h3>
        <p>Uploaded images can be referenced by filename in your documents.</p>
        <div id="img-list" class="img-list"></div>
        <div class="modal-actions">
          <button id="img-upload-more" class="modal-btn">Upload More</button>
          <button id="img-close" class="modal-btn modal-btn-primary">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="parser.js"></script>
  <script src="citations.js"></script>
  <script src="images.js"></script>
  <script src="latex-completions.js"></script>
  <script src="documents.js"></script>
  <script src="editor.js"></script>
</body>
</html>
